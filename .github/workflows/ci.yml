name: CI

# Gate every PR and every push to main on the same three checks the developer
# runs locally: lint, type-check, and a production build. Branch protection on
# both `main` and `production` should require the "check" job below — the
# pull_request trigger has no branch filter, so the promote-to-production PR is
# checked too (owner action / release workflow — see docs/infrastructure.md).
on:
  pull_request:
  push:
    branches: [main]

# One in-flight run per branch; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint · types · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 26.x
          # Caches the npm download cache (~/.npm) keyed on package-lock.json,
          # so `npm ci` reinstalls from cache instead of the network.
          cache: npm

      # sharp 0.33+ ships prebuilt native binaries as optional deps (no build
      # script needed). @sentry/cli's postinstall would download its binary
      # from the Sentry CDN — skipped: CI never uploads source maps, the build
      # is verified to pass without the binary, and it drops a network flake.
      - run: npm ci
        env:
          SENTRYCLI_SKIP_DOWNLOAD: "1"

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        # Build-time env only. Runtime secrets (DATABASE_URL, AUTH_SECRET, R2_*,
        # EMAIL_*) are validated lazily at runtime now — NOT at build — so we set
        # none of them here. That makes this step the guard: the build must
        # succeed with only NEXT_PUBLIC_* present, so reintroducing a top-level
        # (module-load) runtime-env read fails CI here instead of only on Railway.
        # NEXT_PUBLIC_* are inlined into the client bundle at build time, so they
        # must be set here. No SENTRY_DSN on purpose: this proves the app builds
        # without Sentry.
        env:
          CI: "true"
          NEXT_PUBLIC_MAGAZINE_NAME: The Magazine
          NEXT_PUBLIC_ORG_NAME: Your Club
          NEXT_PUBLIC_TAGLINE: A members-only digital magazine.
