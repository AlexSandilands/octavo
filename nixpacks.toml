# Railway / Nixpacks build config. Its one job beyond the default Node build is
# to make headless Chromium available in the deployed container so on-demand PDF
# export works (src/lib/pdf.ts launches it). Two parts:
#   1. aptPkgs — the shared system libraries Chromium needs to launch headless.
#   2. a build step that downloads Playwright's pinned Chromium into the image.
# The install must write into the image's own /root/.cache/ms-playwright — NOT a
# build cache mount (`cacheDirectories`), which is build-only and wouldn't ship
# the browser into the runtime image — so `chromium.launch()` finds it at runtime.
#
# See docs/infrastructure.md "PDF generation" for the memory note and the
# split-to-a-separate-service fallback if the main service can't hold Chromium.
# NOTE: this config must be verified on a real Railway deploy (no headless
# Chromium is available in the dev sandbox to exercise it locally).

[phases.setup]
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxkbcommon0",
  "libatspi2.0-0",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2t64", # renamed from libasound2 in Ubuntu 24.04's time_t transition
]

[phases.playwright]
dependsOn = ["install"]
cmds = ["npx playwright install chromium"]

[phases.build]
dependsOn = ["playwright"]
